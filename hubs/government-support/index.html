<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Government Support Hub — Evantix</title>
  <link rel="stylesheet" href="../../assets/css/shared.css" />
</head>
<body>
  <div id="site-header"></div>
  <div id="breadcrumb"></div>

  <main class="page-main">
    <div class="hub-hero" id="hubHero"></div>
    <div class="section-label">Select a Persona to begin the walkthrough</div>
    <div class="persona-grid" id="personaGrid"></div>
  </main>

  <script src="../../assets/js/shared.js"></script>
  <script>
    const HUB = {
      name: "Government Support Hub",
      slug: "government-support",
      color: "#2B5F9E",
      pastel: "#C5DDF5",
      desc: "Manage government funding, compliance reporting, and student support scheme obligations.",
      comingSoon: false,
      personas: [
        {
          name: "Student",
          slug: "student",
          desc: "Access government funding information, submit support applications, and manage your compliance requirements.",
          tbd: true,
          icon: `<svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3.33 2 8.67 2 12 0v-5"/></svg>`
        },
        {
          name: "Support Advisor",
          slug: "support-advisor",
          desc: "Assist students with government support scheme applications, eligibility checks, and ongoing case management.",
          tbd: true,
          icon: `<svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>`
        },
        {
          name: "Compliance Officer",
          slug: "compliance-officer",
          desc: "Monitor compliance reporting obligations, manage government funding records, and generate regulatory submissions.",
          tbd: true,
          icon: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="9 15 11 17 15 13"/></svg>`
        }
      ]
    };

    document.documentElement.style.setProperty('--hub-color', HUB.color);
    renderHeader({ backHref: '../../index.html', backLabel: 'App Hub' });
    renderBreadcrumb([
      { label: 'App Hub', href: '../../index.html' },
      { label: HUB.name }
    ]);

    document.getElementById('hubHero').style.setProperty('--hub-color', HUB.color);
    document.getElementById('hubHero').innerHTML = `
      <div class="hub-hero-badge">${esc(HUB.name)}</div>
      <h2>${esc(HUB.name)}</h2>
      <p>${esc(HUB.desc)}</p>`;

    const grid = document.getElementById('personaGrid');
    HUB.personas.forEach(p => {
      const card = document.createElement('a');
      card.className = 'persona-card';
      card.href = `${p.slug}/`;
      card.style.setProperty('--hub-color', HUB.color);
      card.style.setProperty('--pastel-bg', hexToRgba(HUB.pastel, 0.45));
      card.innerHTML = `
        <div class="persona-band">${p.icon}</div>
        <div class="persona-body">
          <div class="persona-name">${esc(p.name)}</div>
          <div class="persona-desc">${esc(p.desc)}</div>
          <div class="persona-footer">
            ${p.tbd ? '<span class="tbd-badge">TBD</span>' : '<span></span>'}
            <div class="persona-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
